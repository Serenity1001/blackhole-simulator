<html lang="ko">
<head>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body { width:100%; height:100%; background:#000; overflow:hidden; font-family: 'Segoe UI', sans-serif; color:#fff; }
  canvas { display:block; position:absolute; top:0; left:0; }
  #ui {
    position:absolute; top:0; left:0; padding:18px; z-index:10;
    background:linear-gradient(180deg, rgba(0,0,0,0.75), rgba(0,0,0,0));
    width:320px;
  }
  h1 { font-size:16px; letter-spacing:2px; margin-bottom:14px; color:#eee; font-weight:300; }
  .group { margin-bottom:18px; }
  .label { font-size:11px; letter-spacing:1.5px; color:#888; margin-bottom:6px; text-transform:uppercase; }
  .row { display:flex; gap:6px; flex-wrap:wrap; }
  button {
    background:rgba(255,255,255,0.06); color:#ddd; border:1px solid rgba(255,255,255,0.15);
    padding:7px 11px; font-size:12px; cursor:pointer; border-radius:3px;
    transition:all 0.2s; letter-spacing:0.5px;
  }
  button:hover { background:rgba(255,255,255,0.15); border-color:rgba(255,255,255,0.4); }
  button.active { background:rgba(255,255,255,0.25); border-color:#fff; color:#fff; }
  .info { font-size:10px; color:#666; margin-top:4px; }
  #speedBox { display:flex; align-items:center; gap:10px; }
  #speedVal { font-size:18px; font-weight:300; color:#fff; min-width:50px; }
  input[type=range] { flex:1; accent-color:#fff; }
  #stats { position:absolute; bottom:14px; left:18px; font-size:10px; color:#555; letter-spacing:1px; z-index:10;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <h1>◉ BLACK HOLE SIMULATOR</h1>

  <div class="group">
    <div class="label">블랙홀 질량 (Mass)</div>
    <div class="row" id="massBtns">
      <button data-mass="small">소형 · Cyg X-1</button>
      <button data-mass="medium" class="active">중형 · IMBH</button>
      <button data-mass="large">대형 · TON 618</button>
    </div>
    <div class="info" id="massInfo">~ 10,000 M☉ · 중간질량 블랙홀</div>
  </div>

  <div class="group">
    <div class="label">천체 투척 (Throw Object)</div>
    <div class="row">
      <button data-obj="moon">달</button>
      <button data-obj="earth">지구</button>
      <button data-obj="saturn">토성</button>
      <button data-obj="jupiter">목성</button>
      <button data-obj="sun">태양</button>
    </div>
    <div class="info">버튼 클릭 → 화면 가장자리에서 투척</div>
  </div>

  <div class="group">
    <div class="label">시뮬레이션 배속</div>
    <div id="speedBox">
      <input type="range" id="speed" min="1" max="100" value="1" step="1">
      <div id="speedVal">1x</div>
    </div>
  </div>

  <div class="group">
    <div class="label">관찰 각도 (View Tilt)</div>
    <div id="speedBox">
      <input type="range" id="tilt" min="0" max="90" value="9" step="1">
      <div id="speedVal"><span id="tiltVal">9</span>°</div>
    </div>
    <div class="info">0° = 측면 · 90° = 정면</div>
  </div>

  <div class="group">
    <div class="label">화면 줌 (Zoom)</div>
    <div id="speedBox">
      <button id="zoomOut">−</button>
      <input type="range" id="zoom" min="30" max="400" value="100" step="5">
      <button id="zoomIn">+</button>
      <div id="speedVal"><span id="zoomVal">100</span>%</div>
    </div>
    <div class="info">마우스 휠로도 조작 가능</div>
  </div>

  <div class="group">
    <div class="label">입자 밝기 (Brightness)</div>
    <div id="speedBox">
      <input type="range" id="bright" min="20" max="300" value="100" step="5">
      <div id="speedVal"><span id="brightVal">100</span>%</div>
    </div>
  </div>

  <div class="group">
    <button id="reset">↻ 리셋</button>
  </div>
</div>
<div id="stats">PARTICLES: <span id="pc">0</span> · OBJECTS: <span id="oc">0</span></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, CX, CY;
function resize(){ W=canvas.width=innerWidth; H=canvas.height=innerHeight; CX=W/2; CY=H/2; }
resize(); addEventListener('resize', resize);

// === Black Hole config ===
const MASSES = {
  small:  { name:'Cygnus X-1', solar:21,         radius:70,  disk:150, info:'~ 21 M☉ · 항성질량 블랙홀' },
  medium: { name:'IMBH',       solar:10000,      radius:115, disk:245, info:'~ 10,000 M☉ · 중간질량 블랙홀' },
  large:  { name:'TON 618',    solar:66000000000,radius:200, disk:430, info:'~ 660억 M☉ · 초대질량 블랙홀' }
};
let currentMass = 'medium';
let speedMult = 1;
let brightness = 0.06; // particle brightness multiplier (slider 100% = 0.06x actual)
let zoom = 1.0;       // view zoom

// === Celestial bodies ===
const BODIES = {
  // density: relative to Earth=1; lower = puffier (disrupts farther from BH via Roche).
  moon:    { r:6,  color:'#c8c8c8', name:'Moon',    density: 1.2 },
  earth:   { r:10, color:'#4a90d9', name:'Earth',   density: 1.0 },
  saturn:  { r:22, color:'#d4b17a', ring:true, name:'Saturn',  density: 0.6 },
  jupiter: { r:26, color:'#c9a07a', bands:true, name:'Jupiter', density: 0.7 },
  sun:     { r:34, color:'#ffd27a', star:true, name:'Sun',     density: 0.3 }
};

// === Virtual physics constants (tuned to screen-space units) ===
const C_LIGHT_V = 12;  // virtual speed of light — caps velocities & drives Doppler/redshift
const R_ISCO_FAC = 3.0; // ISCO at 3·rs (Schwarzschild)

// === Accretion disk particles (Interstellar style) ===
// Disk is mostly in the plane but warped; we use 3D with projection to mimic the lensed ring above/below.
let particles = [];
let objects = []; // legacy — kept empty for safety

function makeParticles(){
  particles = [];
  const cfg = MASSES[currentMass];
  const inner = cfg.radius * 1.18;
  const outer = cfg.disk;
  const count = Math.min(6000, Math.floor(2800 + cfg.disk * 10));
  for (let i=0; i<count; i++){
    // concentrate more toward inner (hotter, brighter)
    const r = inner + Math.pow(Math.random(),0.75)*(outer-inner);
    const theta = Math.random()*Math.PI*2;
    // very thin disk (edge-on look)
    const z = (Math.random()-0.5) * (2.5 + (r-inner)*0.02);
    particles.push({
      r, theta, z,
      w: 1 / Math.pow(r/inner, 1.5) * 0.04 * (0.85+Math.random()*0.3),
      heat: Math.random()*0.5 + 0.7,
      size: Math.random()*1.4 + 0.5,
      life: 1
    });
  }
}
makeParticles();

// === Interstellar-like 3D projection with gravitational lensing fake ===
// We tilt the disk by angle tilt; points above/below horizon are lensed to appear above the BH -> classic "ring on top"
// Viewing tilt — 0 = edge-on (sliver), Math.PI/2 = face-on (full disk from above).
// Dynamically controlled by the UI slider.
let viewTilt = 0.16;

function project(x, y, z){
  // viewTilt: 0 → edge-on (disk collapses to sliver), π/2 → face-on (full annulus).
  // Internally we rotate by the complement so the slider matches user intuition.
  const effTilt = Math.PI/2 - viewTilt;
  const cT = Math.cos(effTilt), sT = Math.sin(effTilt);
  const y2 = y*cT - z*sT;
  const z2 = y*sT + z*cT;
  return { x, y: y2, z: z2 };
}

// --- Pseudo-noise for organic turbulence in the accretion flow ---
// Cheap, deterministic, bounded in [-1, 1] approximately. Layered sines produce
// soft spatial structure without the cost of real Perlin/curl noise.
function flowNoise(a, b){
  return (
    Math.sin(a*2.1 + b*1.3 + 0.3) * 0.5 +
    Math.sin(a*1.27 - b*2.7 + 1.7) * 0.3 +
    Math.sin(a*0.43 + b*3.9 - 2.1) * 0.2
  );
}
let flowTime = 0; // advances each frame, drifts the noise field

function drawBlackHoleShadow(){
  const cfg = MASSES[currentMass];
  const rs = cfg.radius;
  // Pure black event horizon (drawn BEFORE disk/lensed arc so top ring can overlap)
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(CX, CY, rs, 0, Math.PI*2);
  ctx.fill();
}

function drawPhotonRing(){
  const cfg = MASSES[currentMass];
  const rs = cfg.radius;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // Dim red halo (outer bloom) — subdued ember tone
  const halo = ctx.createRadialGradient(CX, CY, rs*1.0, CX, CY, rs*3.2);
  halo.addColorStop(0, 'rgba(140,30,20,0.0)');
  halo.addColorStop(0.15, 'rgba(130,28,18,0.40)');
  halo.addColorStop(0.45, 'rgba(90,20,14,0.18)');
  halo.addColorStop(1, 'rgba(50,10,8,0)');
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(CX, CY, rs*3.2, 0, Math.PI*2);
  ctx.fill();

  // Thin photon ring — a dull red-orange glow hugging the horizon
  const ring = ctx.createRadialGradient(CX, CY, rs*1.01, CX, CY, rs*1.35);
  ring.addColorStop(0, 'rgba(180,60,40,0.0)');
  ring.addColorStop(0.15, 'rgba(200,70,45,0.85)');
  ring.addColorStop(0.5,  'rgba(140,30,20,0.65)');
  ring.addColorStop(1,    'rgba(80,15,10,0)');
  ctx.fillStyle = ring;
  ctx.beginPath();
  ctx.arc(CX, CY, rs*1.35, 0, Math.PI*2);
  ctx.fill();

  ctx.restore();
}

// Scales particle RGB with brightness so low slider values actually DARKEN color
// (not just alpha). At slider 100% (default brightness=0.06) cs=1 (no change).
// Below that, colors fade toward black. Above 100%, clamped at 1.
function colorScale(){
  return Math.max(0.05, Math.min(1, brightness / 0.06));
}

function particleColor(tNorm){
  // Low-luminosity red palette — dying-ember / blood accretion look.
  // tNorm: 1 = inner (slightly brighter red) → 0 = outer (near-black crimson).
  let R,G,B;
  if (tNorm > 0.75){ R=200; G=55;  B=35;  }  // inner — deep red
  else if (tNorm > 0.5){ R=160; G=30;  B=20;  } // burgundy
  else if (tNorm > 0.25){ R=110; G=18;  B=12;  } // dark crimson
  else { R=70;  G=10;  B=8;   }                  // near-black red
  const cs = colorScale();
  return {R: Math.round(R*cs), G: Math.round(G*cs), B: Math.round(B*cs)};
}

function drawDiskLayer(front){
  const cfg = MASSES[currentMass];
  const rs = cfg.radius;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  for (const p of particles){
    const x = Math.cos(p.theta)*p.r;
    const y = Math.sin(p.theta)*p.r;
    const pr = project(x, y, p.z);
    const dist2D = Math.hypot(pr.x, pr.y);
    const behind = pr.z < 0;
    if (front && behind) continue;
    if (!front && !behind) continue;
    // occlusion for behind particles
    if (behind && dist2D < rs*0.98) continue;

    const tNorm = 1 - Math.min(1, (p.r - rs)/ (cfg.disk - rs));
    let heat = p.heat * (0.5 + tNorm*1.0);
    let c = particleColor(tNorm);
    const sx = CX+pr.x, sy = CY+pr.y;
    const size = p.size * (1 + tNorm*0.8);

    // === Relativistic Doppler beaming ===
    // Keplerian v ∝ 1/√r.  For edge-on disk, particle at angle θ has LOS
    // velocity component  vLOS ∝ −cos(θ)·cos(viewTilt).  Beaming factor
    // δ⁴ boosts approaching side, dims receding.  Blueshift the bright side
    // slightly (boost G+B), redshift the dark side (drop G+B).
    const vFrac = 0.55 / Math.sqrt(Math.max(1.0, p.r/rs));   // 0..~0.5
    const losSign = -Math.cos(p.theta) * Math.cos(viewTilt); // +1 approaching, -1 receding
    const dFac = Math.max(0.25, Math.min(3.2, Math.pow(1 + losSign*vFrac, 4)));
    heat *= dFac;
    // Color shift: approaching side → hotter (more yellow-orange), receding → deeper red
    if (losSign > 0){
      c = {
        R: Math.min(255, Math.round(c.R * (1 + losSign*vFrac*0.6))),
        G: Math.min(255, Math.round(c.G * (1 + losSign*vFrac*1.2))),
        B: Math.min(255, Math.round(c.B * (1 + losSign*vFrac*1.6)))
      };
    } else {
      const dim = 1 + losSign*vFrac*0.8; // losSign<0 → <1
      c = {
        R: Math.round(c.R * Math.max(0.4, dim)),
        G: Math.round(c.G * Math.max(0.25, dim*0.7)),
        B: Math.round(c.B * Math.max(0.2,  dim*0.5))
      };
    }

    // soft glow halo
    const a1 = Math.min(1, heat*0.45*brightness);
    ctx.fillStyle = `rgba(${c.R},${c.G},${c.B},${a1})`;
    ctx.beginPath();
    ctx.arc(sx, sy, size*3, 0, Math.PI*2);
    ctx.fill();

    // bright core
    ctx.fillStyle = `rgba(${c.R},${c.G},${c.B},${Math.min(1,heat*brightness)})`;
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawEquatorBeam(){
  // Bright horizontal beam along the disk equator — the iconic "light saber" streak
  const cfg = MASSES[currentMass];
  const rs = cfg.radius;
  const beamLen = cfg.disk * 1.8;
  const beamH = rs * 0.55;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  // Wide soft outer halo
  const g1 = ctx.createRadialGradient(CX, CY, 0, CX, CY, beamLen);
  // use transform to squash into a horizontal ellipse
  ctx.translate(CX, CY);
  ctx.scale(1, beamH / beamLen);

  const glow = ctx.createRadialGradient(0,0,0, 0,0, beamLen);
  glow.addColorStop(0.0, `rgba(210,70,45,${0.9*brightness})`);
  glow.addColorStop(0.08,`rgba(180,45,30,${0.8*brightness})`);
  glow.addColorStop(0.25,`rgba(130,25,18,${0.5*brightness})`);
  glow.addColorStop(0.55,`rgba(80,15,10,${0.2*brightness})`);
  glow.addColorStop(1.0, 'rgba(40,8,6,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(0,0, beamLen, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();

  // Thin hot core streak
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  ctx.translate(CX, CY);
  ctx.scale(1, (rs*0.18) / beamLen);
  const core = ctx.createRadialGradient(0,0,0, 0,0, beamLen);
  core.addColorStop(0.0, `rgba(240,110,70,${0.95*brightness})`);
  core.addColorStop(0.15,`rgba(200,65,40,${0.8*brightness})`);
  core.addColorStop(0.5, `rgba(130,25,18,${0.35*brightness})`);
  core.addColorStop(1.0, 'rgba(60,10,8,0)');
  ctx.fillStyle = core;
  ctx.beginPath();
  ctx.arc(0,0, beamLen, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawLensedTopArc(){
  // The iconic "ring over the top" — far-side disk photons bent up around BH.
  // We build it from particle data so it animates with the rotating disk.
  const cfg = MASSES[currentMass];
  const rs = cfg.radius;

  ctx.save();
  ctx.globalCompositeOperation = 'lighter';

  for (const p of particles){
    const x = Math.cos(p.theta)*p.r;
    const y = Math.sin(p.theta)*p.r;
    const pr = project(x, y, p.z);
    if (pr.z >= 0) continue; // only back-side particles contribute to the top arc
    const dist2D = Math.hypot(pr.x, pr.y);
    if (dist2D > cfg.disk) continue;

    // Map back-side particles to an arc that wraps OVER the BH and connects
    // smoothly to the equator at both ends (continuous flow with the front disk).
    const ang = Math.atan2(pr.y, pr.x); // original projected angle (disk frame)

    // Arc radius scales with the particle's orbital radius so outer particles
    // form an outer arc that meets the disk's outer equator extent.
    const rArc = rs * 1.05 + (p.r - rs) * 0.62;

    // spread = π/2 → arc spans exactly the upper semicircle: endpoints at angles
    // 0 and -π (i.e., screen y = 0). This is what visually bridges to the equator.
    const spread = Math.PI / 2;
    const arcAng = -Math.PI/2 + Math.cos(ang) * spread;
    const lx = Math.cos(arcAng) * rArc;
    const ly = Math.sin(arcAng) * rArc;

    const tNorm = 1 - Math.min(1, (p.r - rs)/ (cfg.disk - rs));
    const c = particleColor(tNorm);
    const heat = p.heat * (0.6 + tNorm*0.9);
    const size = p.size * (1 + tNorm*0.6);
    const sx = CX+lx, sy = CY+ly;

    // Fade the arc near the equator endpoints so it blends smoothly into the
    // horizontal flow rather than ending abruptly.
    const endFade = Math.min(1, Math.abs(Math.sin(arcAng)) * 1.6);

    ctx.fillStyle = `rgba(${c.R},${c.G},${c.B},${Math.min(1,heat*0.4*brightness*endFade)})`;
    ctx.beginPath(); ctx.arc(sx, sy, size*3.2, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = `rgba(${c.R},${c.G},${c.B},${Math.min(1,heat*0.95*brightness*endFade)})`;
    ctx.beginPath(); ctx.arc(sx, sy, size*1.1, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function updateParticles(dt){
  const cfg = MASSES[currentMass];
  const rs = cfg.radius;
  flowTime += 0.004 * dt;
  for (const p of particles){
    // Organic turbulence: noise-driven angular wobble + radial breathing.
    // The noise field slowly drifts with flowTime, producing eddies and streams
    // instead of a perfectly Keplerian disk.
    const n1 = flowNoise(p.theta*1.5, p.r*0.015 + flowTime);
    const n2 = flowNoise(p.theta*2.0 + 7, p.r*0.025 - flowTime*0.7);
    p.theta += (p.w + n1 * 0.006) * dt;
    p.r    += n2 * 0.35 * dt;

    // Constant slow inward drift (mass accretion)
    p.r -= 0.03 * dt;
    // stronger sink near horizon
    if (p.r < rs*1.3) p.r -= 0.08 * dt;

    // keep particles within disk band
    if (p.r < rs*1.05 || p.r > cfg.disk*1.05){
      p.r = cfg.disk * (0.8 + Math.random()*0.2);
      p.theta = Math.random()*Math.PI*2;
      p.z = (Math.random()-0.5)*6;
    }
  }
}

// === Thrown objects as particle clusters ===
// Each thrown body is a swarm of sub-particles that fall in individually,
// producing naturally-emergent tidal spaghettification and streaming tails.

const BODY_PALETTES = {
  moon:    [[210,210,210],[170,170,170],[230,230,230],[150,150,160],[190,185,180]],
  earth:   [[60,140,220],[90,180,230],[60,170,90],[200,190,170],[45,110,190]],
  saturn:  [[220,185,130],[190,150,100],[240,205,150],[170,135,90],[200,170,120]],
  jupiter: [[210,170,130],[165,115,85],[230,190,150],[180,130,95],[140,95,70]],
  sun:     [[255,245,210],[255,215,135],[255,170,90],[255,230,170],[255,130,60]]
};

let bodyParticles = []; // all particles from thrown objects
let cores = [];         // invisible point-mass at cluster center (planet's gravity well)
let clusterSeq = 0;     // unique id per throw
let sinks = [];         // impact points on EH surface that suck in scattered particles
const G_CORE = 0.08;    // cluster self-gravity strength
const CORE_SOFT = 4;    // softening ε² used for core gravity (keep consistent with throw & update!)
const MAX_PARTICLE_V = 7; // hard speed cap to prevent numerical runaway

function throwObject(kind){
  const b = BODIES[kind];
  const palette = BODY_PALETTES[kind];
  // spawn at random edge
  const edge = Math.floor(Math.random()*4);
  let x,y;
  if (edge===0){ x=-40; y=Math.random()*H; }
  else if (edge===1){ x=W+40; y=Math.random()*H; }
  else if (edge===2){ x=Math.random()*W; y=-40; }
  else { x=Math.random()*W; y=H+40; }

  // aim roughly toward BH
  const dx = CX - x, dy = CY - y;
  const d = Math.hypot(dx,dy);
  const nx = dx/d, ny = dy/d;
  const tx = -ny, ty = nx;
  const side = Math.random()<0.5 ? 1 : -1;

  // 50% capture vs 50% grazing orbit
  const captured = Math.random() < 0.5;
  const baseSpeed = 0.8 + Math.random()*0.3;
  const tanBoost = captured ? (0.1 + Math.random()*0.3)
                             : (0.9 + Math.random()*0.5);
  const vxBase = nx*baseSpeed + tx*tanBoost*side;
  const vyBase = ny*baseSpeed + ty*tanBoost*side;

  // Rigid-body cluster: particles maintain fixed offsets from core, co-rotating.
  // BH gravity acts on the CORE as if the cluster were a single object (as before).
  // Particles "detach" progressively when tidal forces near the BH exceed cohesion —
  // implemented as an exposure-threshold release rather than numerical N-body self-gravity.
  const cid = ++clusterSeq;
  const N = Math.floor(120 + b.r * 10);
  const radius = b.r;
  const spinSign = Math.random() < 0.5 ? 1 : -1;
  const omega = spinSign * (0.015 + Math.random()*0.02); // rigid rotation rate rad/frame

  // === Dynamic Roche / tidal radius ===
  // r_T ≈ R_body · (M_BH / M_body)^(1/3).  In our sim we proxy mass by rs and
  // body density → larger BH + lower body density ⇒ disrupted farther out.
  // Base: ~1.3·rs (small) → 1.8·rs (large); modified by 1/∛density.
  const massCfg = MASSES[currentMass];
  const rsNow = massCfg.radius;
  const baseT = currentMass==='small'  ? 1.3 * rsNow
              : currentMass==='medium' ? 1.55 * rsNow
              :                          1.85 * rsNow;
  const tidalR = baseT * Math.pow(1.0 / b.density, 1/3);

  cores.push({
    cid, x, y, vx:vxBase, vy:vyBase, mass:N, alive:true,
    angle: 0, omega, radius,
    tidalR,                // distance at which tidal disruption fires
    disrupted: false,      // one-shot TDE flag
    d: 9999, nx: 0, ny: 0  // updated each frame
  });

  for (let i=0; i<N; i++){
    const ang = Math.random()*Math.PI*2;
    const rr = Math.pow(Math.random(),0.5) * radius;
    const ox = Math.cos(ang)*rr;
    const oy = Math.sin(ang)*rr;

    const col = palette[Math.floor(Math.random()*palette.length)];
    bodyParticles.push({
      cid,
      attached: true,
      ox, oy,
      x: x + ox, y: y + oy,
      px: x + ox, py: y + oy,
      vx: vxBase, vy: vyBase,
      size: 0.7 + Math.random()*1.3,
      r: col[0], g: col[1], b: col[2],
      life: 1,
      hot: 0,
      stream: null,     // null | 'bound' | 'unbound' — set at tidal disruption
      redshift: 0       // gravitational redshift (filled each frame after release)
    });
  }

  // Flash sun a little since it emits its own light
  if (kind==='sun'){
    for (const p of bodyParticles.slice(-N)){
      p.hot = 0.5 + Math.random()*0.3;
    }
  }
}

function updateBodyParticles(dt){
  const cfg = MASSES[currentMass];
  const rs = cfg.radius;
  const G = currentMass==='small'? 900 : currentMass==='medium'? 2200 : 4800;
  const RISCO = rs * R_ISCO_FAC;
  const CLIGHT = C_LIGHT_V;
  const C_CAP2 = (CLIGHT*0.85)*(CLIGHT*0.85);

  // --- Pass 1: cluster cores — Newtonian + ISCO plunge + TDE trigger ---
  const coreMap = new Map();
  const disruptedEvents = []; // process after pass 1 so bodyParticles scan is consistent
  for (const core of cores){
    if (!core.alive) continue;
    const dx = CX - core.x, dy = CY - core.y;
    const d2 = dx*dx + dy*dy;
    const d = Math.sqrt(d2);
    const nx = dx/d, ny = dy/d;

    // Newtonian gravity + pseudo-GR inner boost
    const extra = d < RISCO ? (1 + (RISCO/d - 1)*1.8) : 1;
    const aBH = G * extra / Math.max(d2, 300);
    core.vx += nx * aBH * dt * 0.10;
    core.vy += ny * aBH * dt * 0.10;

    // Outside ISCO: mild circularization (stable orbits possible)
    if (d > RISCO && d < RISCO*1.35){
      const radialV = core.vx*nx + core.vy*ny;
      core.vx -= nx * radialV * 0.012 * dt;
      core.vy -= ny * radialV * 0.012 * dt;
    }
    // Inside ISCO: NO circularization — angular momentum cannot hold a stable
    // orbit; bleed it off so the core plunges (Schwarzschild ISCO physics).
    if (d < RISCO){
      const amBleed = 0.01 * dt;
      const radialV = core.vx*nx + core.vy*ny;
      const tangV = Math.sqrt(Math.max(0, core.vx*core.vx + core.vy*core.vy - radialV*radialV));
      // reduce tangential velocity → spiral in
      if (tangV > 0){
        const tx = -ny, ty = nx;
        const tSign = core.vx*tx + core.vy*ty >= 0 ? 1 : -1;
        core.vx -= tx * tSign * tangV * amBleed;
        core.vy -= ty * tSign * tangV * amBleed;
      }
    }

    core.x += core.vx * dt;
    core.y += core.vy * dt;
    core.angle += core.omega * dt;

    core.d = d; core.nx = nx; core.ny = ny;

    // === TIDAL DISRUPTION EVENT (TDE) ===
    // When d ≤ r_T the body is torn apart.  The bound/unbound split requires
    // a *radial velocity reset* (not just a weak kick), otherwise the core's
    // inward momentum drags both halves into the BH together.
    //   Bound  half → new radial = +v_esc·0.9  (strongly inward, quick plunge)
    //   Unbound half → new radial = −v_esc·1.2  (reversed, true hyperbolic escape)
    // Tangential (angular-momentum-carrying) component is preserved.
    if (!core.disrupted && d <= core.tidalR){
      core.disrupted = true;
      const vEsc = Math.sqrt(2 * G / Math.max(d, rs));
      disruptedEvents.push({ cid: core.cid, core, vEsc });
      flashes.push({ x: core.x, y: core.y, r: rs*0.25, life: 1 });
      core.alive = false;
    }

    if (core.alive && d < rs*1.0) core.alive = false; // safety
    if (core.alive) coreMap.set(core.cid, core);
  }
  cores = cores.filter(c => c.alive);

  // --- TDE release: bifurcate into bound/unbound streams with gradient kick ---
  // Consistent with attached stretch: rotate-first then stretch-along-world-radial.
  // Kick magnitude is POSITION-DEPENDENT (∝ exposure) rather than binary, so the
  // separation surface is a smooth gradient, not a clean knife-cut.
  if (disruptedEvents.length > 0){
    for (const ev of disruptedEvents){
      const {core, vEsc} = ev;
      // At phase=1, spin is 85% suppressed (tidal axis locked)
      const effAngle = core.angle * 0.15;
      const cA = Math.cos(effAngle), sA = Math.sin(effAngle);
      const stretchR = 10.0;
      const compressT = 0.28;
      for (const p of bodyParticles){
        if (p.cid !== core.cid || !p.attached) continue;

        // Rotate-first internal structure
        const rox = p.ox*cA - p.oy*sA;
        const roy = p.ox*sA + p.oy*cA;
        // Stretch along world-radial (BH direction)
        const radialComp = rox*core.nx + roy*core.ny;
        const tCx = rox - radialComp*core.nx;
        const tCy = roy - radialComp*core.ny;
        const wx = radialComp*stretchR*core.nx + tCx*compressT;
        const wy = radialComp*stretchR*core.ny + tCy*compressT;
        p.x = core.x + wx;
        p.y = core.y + wy;
        p.px = p.x; p.py = p.y;

        // Baseline velocity (mostly orbital + tiny residual spin)
        const vxR = core.vx - core.omega * 0.15 * wy;
        const vyR = core.vy + core.omega * 0.15 * wx;

        // === Position-dependent radial kick (continuous tidal energy spread) ===
        // exposure: wx*core.nx + wy*core.ny ∈ [−R·stretchR, +R·stretchR]
        //   +1 (full nearside) → strong inward (bound, rapid plunge)
        //    0 (equator)       → near-zero kick (marginally bound)
        //   −1 (full farside)  → strong outward (unbound, hyperbolic escape)
        const exposure = wx*core.nx + wy*core.ny;
        const expNorm = Math.max(-1, Math.min(1, exposure / (core.radius * stretchR)));
        // Magnitude tuned so farside escapes (>v_esc) and nearside plunges fast
        const kickAlongN = expNorm * vEsc * 1.4
                         + (Math.random() - 0.5) * vEsc * 0.25;   // chaos
        // Tangential jitter to dissolve the "knife-cut" edge
        const jitterMag = (Math.random() - 0.5) * vEsc * 0.35 * Math.abs(expNorm);
        const perpX = -core.ny, perpY = core.nx;

        p.vx = vxR + core.nx * kickAlongN + perpX * jitterMag;
        p.vy = vyR + core.ny * kickAlongN + perpY * jitterMag;
        p.stream = expNorm >= 0 ? 'bound' : 'unbound';
        p.attached = false;
      }
    }
  }

  // --- Pass 2: particles ---
  // Attached particles: rigid rotation + progressive spaghettification stretch.
  // Detached particles: Newtonian free-fall + GR time-dilation + redshift.
  for (const p of bodyParticles){
    if (p.attached){
      const core = coreMap.get(p.cid);
      if (!core){ p.attached = false; }
      else {
        p.px = p.x; p.py = p.y;
        // Progressive tidal stretch — wider window (3.5·r_T → r_T) and stronger
        // peak (10×) so the body clearly becomes a long thin noodle.
        const phase = Math.max(0, Math.min(1,
            (core.tidalR*3.5 - core.d) / (core.tidalR*2.5)));

        // === CRITICAL ORDER: rotate FIRST, then stretch along world-radial ===
        // Previously the stretch was computed along core.n then rotated by
        // core.angle, which knocked the noodle off the BH axis. Correct order
        // is: rotate the internal structure (particles shuffle around), THEN
        // apply radial-aligned stretch — so the noodle is always aimed at BH.
        // Spin is also attenuated by phase so tidal forces dominate rotation.
        const effAngle = core.angle * (1 - phase*0.85);
        const cA = Math.cos(effAngle), sA = Math.sin(effAngle);
        const rox = p.ox*cA - p.oy*sA;
        const roy = p.ox*sA + p.oy*cA;

        const radialComp = rox*core.nx + roy*core.ny;
        const tCx = rox - radialComp*core.nx;
        const tCy = roy - radialComp*core.ny;
        const stretchR = 1 + phase * 9.0;    // up to 10× radial elongation
        const compressT = 1 - phase * 0.72;  // down to 0.28× tangential
        const wx = radialComp*stretchR*core.nx + tCx*compressT;
        const wy = radialComp*stretchR*core.ny + tCy*compressT;

        p.x = core.x + wx;
        p.y = core.y + wy;
        // Rigid velocity (reduced spin contribution as phase → 1)
        p.vx = core.vx - core.omega * (1 - phase*0.85) * wy;
        p.vy = core.vy + core.omega * (1 - phase*0.85) * wx;
        if (core.d < rs*3){
          p.hot = Math.min(1, p.hot + 0.012*dt);
        }
        // Redshift is near zero while body is intact and far from EH
        p.redshift = 0;
        continue;
      }
    }

    // --- Free-fall integration (detached — post-TDE) ---
    p.px = p.x; p.py = p.y;

    const dx = CX - p.x, dy = CY - p.y;
    const d2 = dx*dx+dy*dy;
    const d = Math.sqrt(d2);
    const nx = dx/d, ny = dy/d;

    // Newtonian gravity + pseudo-GR inner boost
    const extra = d < RISCO ? (1 + (RISCO/d - 1)*1.8) : 1;
    const aBH = G * extra / Math.max(d2, 300);
    p.vx += nx * aBH * dt * 0.10;
    p.vy += ny * aBH * dt * 0.10;

    // Inside ISCO: bleed angular momentum → forced plunge (no stable orbit)
    if (d < RISCO){
      const radialV = p.vx*nx + p.vy*ny;
      const vx2 = p.vx - nx*radialV;
      const vy2 = p.vy - ny*radialV;
      const tSp = Math.sqrt(vx2*vx2 + vy2*vy2);
      if (tSp > 0){
        const bleed = 0.015 * dt;
        p.vx -= vx2 * bleed;
        p.vy -= vy2 * bleed;
      }
    }

    // Soft velocity cap at 0.85c
    const sp2 = p.vx*p.vx + p.vy*p.vy;
    if (sp2 > C_CAP2){
      const sp = Math.sqrt(sp2);
      const k = (CLIGHT*0.85) / sp;
      p.vx *= k; p.vy *= k;
    }

    // === GR: gravitational redshift + time dilation ===
    // Schwarzschild:  dτ/dt = √(1 − r_s/r)
    const rsFrac = Math.max(0.04, 1 - rs/Math.max(d, rs*1.02));
    const dilation = Math.sqrt(rsFrac);   // ∈ (0.2, 1)
    p.redshift = (1/dilation) - 1;        // z grows without bound near horizon

    // Position update — TIME DILATION slows proper motion as observed from infinity.
    // The closer to the horizon, the more the particle appears to "freeze".
    p.x += p.vx * dt * dilation;
    p.y += p.vy * dt * dilation;

    if (d < rs*3){
      p.hot = Math.min(1, p.hot + 0.012*dt);
    }

    // Absorption at horizon (external frame: asymptotic; we just cull inside)
    if (d < rs*1.01) p.life = 0;
    // Unbound stream: remove when well off-screen (saves perf)
    if (p.x < -400 || p.x > W+400 || p.y < -400 || p.y > H+400) p.life = 0;
  }
  bodyParticles = bodyParticles.filter(p=>p.life > 0);
  sinks = []; // legacy array kept; no longer used by the rewind system.
}

function drawBodyParticles(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  const cs = colorScale();
  const cfg = MASSES[currentMass];
  const rs = cfg.radius;

  for (const p of bodyParticles){
    const hot = p.hot;
    let Rm = p.r*(1-hot) + 220*hot;
    let Gm = p.g*(1-hot) + 80*hot;
    let Bm = p.b*(1-hot) + 50*hot;

    // === Gravitational redshift shading ===
    // z large  → drop blue fastest, then green; red preserved → deep crimson.
    const z = Math.min(3, p.redshift || 0);
    const shift = 1 / (1 + z);
    Gm *= shift;
    Bm *= shift * shift;
    // Overall intensity dims too (energy drain to climb out of potential well)
    const intensity = Math.pow(shift, 0.6);

    const R = Math.round(Rm * cs);
    const G = Math.round(Gm * cs);
    const B = Math.round(Bm * cs);

    const lifeFade = Math.max(0, Math.min(1, p.life));
    const baseA = (0.45 + hot*0.55) * lifeFade * intensity;
    const a1 = Math.min(1, baseA * brightness * 4);
    const a2 = Math.min(1, baseA * brightness * 8);

    const sx = p.px, sy = p.py;
    const ex = p.x,  ey = p.y;
    const len2 = (ex-sx)*(ex-sx) + (ey-sy)*(ey-sy);
    // Streak rendering for fast-moving detached particles (stream motion blur)
    const useStreak = !p.attached && len2 > 3 && (p.stream || hot > 0.4);
    if (useStreak){
      ctx.strokeStyle = `rgba(${R},${G},${B},${a1*0.55})`;
      ctx.lineWidth = p.size * (2.4 + hot*1.2);
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
      ctx.stroke();
      ctx.strokeStyle = `rgba(${R},${G},${B},${a2})`;
      ctx.lineWidth = p.size * 1.1;
      ctx.beginPath();
      ctx.moveTo(sx, sy); ctx.lineTo(ex, ey);
      ctx.stroke();
    } else {
      ctx.fillStyle = `rgba(${R},${G},${B},${a1*0.5})`;
      ctx.beginPath();
      ctx.arc(ex, ey, p.size*(2.2+hot*1.5), 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = `rgba(${R},${G},${B},${a2})`;
      ctx.beginPath();
      ctx.arc(ex, ey, p.size, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.restore();
}

let flashes = [];
function drawFlashes(dt){
  for (const f of flashes){
    f.life -= 0.02*dt;
    const a = Math.max(0, f.life);
    const gr = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r*3);
    gr.addColorStop(0, `rgba(255,255,255,${a*0.8})`);
    gr.addColorStop(0.3, `rgba(255,220,150,${a*0.5})`);
    gr.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gr;
    ctx.beginPath();
    ctx.arc(f.x,f.y,f.r*3,0,Math.PI*2);
    ctx.fill();
  }
  flashes = flashes.filter(f=>f.life>0);
}

// drawObjects removed — thrown bodies are now rendered as particle clusters via drawBodyParticles().

// === Starfield ===
const stars = [];
for (let i=0;i<400;i++){
  stars.push({x:Math.random(), y:Math.random(), s:Math.random()*1.2+0.2, tw:Math.random()*Math.PI*2});
}
function drawStars(t){
  for (const s of stars){
    const dx = s.x*W - CX, dy = s.y*H - CY;
    const d = Math.hypot(dx,dy);
    const cfg = MASSES[currentMass];
    // hide near BH (lensing blackout)
    if (d < cfg.radius*1.15) continue;
    const a = 0.5 + Math.sin(t*0.002 + s.tw)*0.3;
    ctx.fillStyle = `rgba(255,255,255,${a*0.7})`;
    ctx.fillRect(s.x*W, s.y*H, s.s, s.s);
  }
}

// === Main loop ===
let last = performance.now();
function loop(t){
  const raw = Math.min(50, t - last);
  last = t;
  const dt = (raw/16.67) * speedMult;

  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(0,0,W,H);

  drawStars(t);

  // Apply zoom around screen center
  ctx.setTransform(zoom,0,0,zoom, CX - CX*zoom, CY - CY*zoom);

  updateParticles(dt);
  // Back-layer disk (behind BH), then shadow, then top lensed arc, photon ring, front disk
  drawEquatorBeam();        // wide horizontal beam behind everything
  drawDiskLayer(false);     // back half of disk
  drawBlackHoleShadow();    // black event horizon covers occluded region
  drawLensedTopArc();       // iconic ring over the top
  drawPhotonRing();          // bright halo around horizon
  drawDiskLayer(true);       // front half of disk (crosses under BH)
  // Re-draw equator core streak on TOP so beam clearly extends past BH on both sides
  (function(){
    const cfg = MASSES[currentMass];
    const rs = cfg.radius;
    const beamLen = cfg.disk * 1.8;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.translate(CX, CY);
    ctx.scale(1, (rs*0.12)/beamLen);
    const core = ctx.createRadialGradient(0,0,0, 0,0, beamLen);
    core.addColorStop(0.0, `rgba(230,100,65,${0.85*brightness})`);
    core.addColorStop(0.25,`rgba(170,40,25,${0.45*brightness})`);
    core.addColorStop(1.0, 'rgba(60,10,8,0)');
    ctx.fillStyle = core;
    ctx.beginPath(); ctx.arc(0,0,beamLen,0,Math.PI*2); ctx.fill();
    ctx.restore();
  })();
  updateBodyParticles(dt);
  drawBodyParticles();
  drawFlashes(dt);

  // Reset transform for UI overlays
  ctx.setTransform(1,0,0,1,0,0);

  document.getElementById('pc').textContent = particles.length;
  document.getElementById('oc').textContent = bodyParticles.length;

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// === UI ===
document.querySelectorAll('#massBtns button').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('#massBtns button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentMass = btn.dataset.mass;
    document.getElementById('massInfo').textContent = MASSES[currentMass].info;
    makeParticles();
  });
});
document.querySelectorAll('[data-obj]').forEach(btn=>{
  btn.addEventListener('click',()=> throwObject(btn.dataset.obj));
});
const speed = document.getElementById('speed');
const speedVal = document.getElementById('speedVal');
speed.addEventListener('input',()=>{
  speedMult = parseFloat(speed.value);
  speedVal.textContent = speedMult + 'x';
});
const bright = document.getElementById('bright');
const brightVal = document.getElementById('brightVal');
bright.addEventListener('input',()=>{
  brightness = (parseFloat(bright.value)/100) * 0.06;
  brightVal.textContent = bright.value;
});

const tiltSlider = document.getElementById('tilt');
const tiltVal = document.getElementById('tiltVal');
tiltSlider.addEventListener('input',()=>{
  const deg = parseFloat(tiltSlider.value);
  viewTilt = deg * Math.PI / 180;
  tiltVal.textContent = deg;
});

const zoomSlider = document.getElementById('zoom');
const zoomVal = document.getElementById('zoomVal');
function setZoom(v){
  v = Math.max(30, Math.min(400, v));
  zoom = v/100;
  zoomSlider.value = v;
  zoomVal.textContent = Math.round(v);
}
zoomSlider.addEventListener('input',()=> setZoom(parseFloat(zoomSlider.value)));
document.getElementById('zoomIn').addEventListener('click',()=> setZoom(parseFloat(zoomSlider.value)+20));
document.getElementById('zoomOut').addEventListener('click',()=> setZoom(parseFloat(zoomSlider.value)-20));
canvas.addEventListener('wheel',(e)=>{
  e.preventDefault();
  const delta = e.deltaY < 0 ? 15 : -15;
  setZoom(parseFloat(zoomSlider.value) + delta);
},{passive:false});
document.getElementById('reset').addEventListener('click',()=>{
  bodyParticles = []; cores = []; flashes = []; makeParticles();
});
</script>
</body>
